services:
  - type: web
    name: streamlit-app
    env: python
    plan: free

    buildCommand: |
      python3.10 -m pip install --upgrade pip
      python3.10 -m pip install -r requirements.txt

    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
